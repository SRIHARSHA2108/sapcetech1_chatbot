{% extends "base.html" %}

{% block title %}Register | Flask Mongo App{% endblock %}

{% block content %}
<section class="auth-section">
    <form class="auth-card" method="POST">
        <h1>Create account</h1>
        <label for="name">Full name</label>
        <input id="name" name="name" type="text" placeholder="Your name" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Minimum 6 characters" required>

        <label for="confirm_password">Confirm password</label>
        <input id="confirm_password" name="confirm_password" type="password" placeholder="Repeat password" required>

        <button class="button full" type="submit">Register</button>
        <p class="muted">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    </form>
</section>
{% endblock %}
